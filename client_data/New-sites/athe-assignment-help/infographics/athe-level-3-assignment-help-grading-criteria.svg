<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="100%" role="img" aria-labelledby="l3-infographic-title">
  <title id="l3-infographic-title">ATHE Level 3 Grading Criteria: Pass, Merit, and Distinction Compared with Concrete Examples</title>

  <!-- Background -->
  <rect width="800" height="520" fill="#F4F7FB" rx="14"/>

  <!-- Header -->
  <rect width="800" height="64" fill="#1B3A6B" rx="14"/>
  <rect y="50" width="800" height="14" fill="#1B3A6B"/>
  <text x="400" y="28" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#FFFFFF">ATHE Level 3 Grading Criteria: Pass · Merit · Distinction</text>
  <text x="400" y="52" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#A8C4E0">Extended Diploma — Business Management · Healthcare · Tourism &amp; Hospitality</text>

  <!-- Column headers -->
  <!-- PASS column -->
  <rect x="28" y="78" width="230" height="36" rx="8" fill="#4B5563"/>
  <text x="143" y="102" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">PASS</text>

  <!-- MERIT column -->
  <rect x="284" y="78" width="230" height="36" rx="8" fill="#2563EB"/>
  <text x="399" y="102" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">MERIT</text>

  <!-- DISTINCTION column -->
  <rect x="540" y="78" width="232" height="36" rx="8" fill="#D97706"/>
  <text x="656" y="102" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">DISTINCTION</text>

  <!-- ── Row 1: What it requires ── -->
  <rect x="28" y="124" width="230" height="80" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <text x="38" y="143" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#4B5563">WHAT IT REQUIRES</text>
  <text x="38" y="160" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">All LOs addressed with</text>
  <text x="38" y="175" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">sufficient knowledge.</text>
  <text x="38" y="190" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">Descriptive and factual.</text>

  <rect x="284" y="124" width="230" height="80" rx="8" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="294" y="143" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#1D4ED8">WHAT IT REQUIRES</text>
  <text x="294" y="160" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">All LOs met + Merit descriptors.</text>
  <text x="294" y="175" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">Coherent explanation with</text>
  <text x="294" y="190" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">relevant applied examples.</text>

  <rect x="540" y="124" width="232" height="80" rx="8" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1"/>
  <text x="550" y="143" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#92400E">WHAT IT REQUIRES</text>
  <text x="550" y="160" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">All LOs + Merit + Distinction</text>
  <text x="550" y="175" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">descriptors. Evaluation +</text>
  <text x="550" y="190" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">justified recommendations.</text>

  <!-- ── Row 2: Business example ── -->
  <text x="28" y="222" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#1B3A6B">BUSINESS EXAMPLE — Management Styles Unit</text>

  <rect x="28" y="230" width="230" height="80" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <text x="38" y="249" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">Describes autocratic,</text>
  <text x="38" y="264" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">democratic, and laissez-faire</text>
  <text x="38" y="279" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">management styles.</text>

  <rect x="284" y="230" width="230" height="80" rx="8" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="294" y="249" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">Explains which style is most</text>
  <text x="294" y="264" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">appropriate for a named business</text>
  <text x="294" y="279" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">context and why.</text>

  <rect x="540" y="230" width="232" height="80" rx="8" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1"/>
  <text x="550" y="249" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">Evaluates limitations of each</text>
  <text x="550" y="264" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">style, weighs factors (skill level,</text>
  <text x="550" y="279" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">urgency), makes justified rec.</text>

  <!-- ── Row 3: Healthcare example ── -->
  <text x="28" y="328" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#1B3A6B">HEALTHCARE EXAMPLE — Human Growth &amp; Development Unit</text>

  <rect x="28" y="336" width="230" height="80" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <text x="38" y="355" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">Describes Piaget's stages of</text>
  <text x="38" y="370" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">cognitive development and</text>
  <text x="38" y="385" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">names each stage.</text>

  <rect x="284" y="336" width="230" height="80" rx="8" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="294" y="355" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">Applies a specific stage to a</text>
  <text x="294" y="370" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">care scenario and explains</text>
  <text x="294" y="385" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">the care worker's response.</text>

  <rect x="540" y="336" width="232" height="80" rx="8" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1"/>
  <text x="550" y="355" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">Evaluates Piaget vs Erikson for</text>
  <text x="550" y="370" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">the scenario, recommends</text>
  <text x="550" y="385" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">specific care approach + why.</text>

  <!-- ── Key rule bar ── -->
  <rect x="28" y="428" width="744" height="46" rx="8" fill="#1B3A6B"/>
  <text x="400" y="447" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">"Describe" = Pass · "Analyse why, applied to a context" = Merit · "Evaluate, weigh, and recommend" = Distinction</text>
  <text x="400" y="464" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#A8C4E0">Harvard referencing required at all grades · Level 3 standard: author-date in-text + reference list</text>

  <!-- Footer -->
  <text x="400" y="512" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#9CA3AF">ATHE Assignment Help Service</text>
</svg>
