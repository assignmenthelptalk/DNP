  <text x="400" y="400" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#E5E7EB">Merit and Distinction at Level 5 demonstrate independent research, critical evaluation, and synthesis — the same skills</text>
