<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" width="100%" role="img" aria-labelledby="l4-infographic-title">
  <title id="l4-infographic-title">ATHE Level 4 Pass, Merit and Distinction Grading Descriptors with Common Failure Points</title>

  <!-- Background -->
  <rect width="800" height="560" fill="#F4F7FB" rx="14"/>

  <!-- Header -->
  <rect width="800" height="64" fill="#1B3A6B" rx="14"/>
  <rect y="50" width="800" height="14" fill="#1B3A6B"/>
  <text x="400" y="28" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#FFFFFF">ATHE Level 4 Grading Descriptors — Diploma (CertHE Equivalent)</text>
  <text x="400" y="52" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#A8C4E0">Business Management · Healthcare Management · Computing · Tourism &amp; Hospitality</text>

  <!-- PASS Card -->
  <rect x="28" y="82" width="230" height="330" rx="10" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.5"/>
  <rect x="28" y="82" width="230" height="40" rx="10" fill="#4B5563"/>
  <rect x="28" y="108" width="230" height="14" fill="#4B5563"/>
  <text x="143" y="108" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">PASS</text>

  <text x="44" y="144" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#374151">DESCRIPTOR</text>
  <text x="44" y="160" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">All learning outcomes addressed</text>
  <text x="44" y="175" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">with adequate evidence.</text>
  <text x="44" y="190" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">Descriptive but complete.</text>

  <line x1="44" y1="202" x2="242" y2="202" stroke="#E5E7EB" stroke-width="1"/>

  <text x="44" y="218" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#374151">WHAT THE ASSESSOR CHECKS</text>
  <text x="44" y="234" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">✓ Every LO is addressed</text>
  <text x="44" y="249" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">✓ Subject knowledge is correct</text>
  <text x="44" y="264" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">✓ Evidence is relevant</text>
  <text x="44" y="279" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">✓ Harvard refs present</text>

  <line x1="44" y1="292" x2="242" y2="292" stroke="#E5E7EB" stroke-width="1"/>

  <text x="44" y="308" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#DC2626">MOST COMMON FAILURE</text>
  <text x="44" y="324" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">Missing one LO entirely —</text>
  <text x="44" y="339" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">fails regardless of quality</text>
  <text x="44" y="354" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">of remaining sections.</text>

  <!-- MERIT Card -->
  <rect x="284" y="82" width="230" height="330" rx="10" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5"/>
  <rect x="284" y="82" width="230" height="40" rx="10" fill="#2563EB"/>
  <rect x="284" y="108" width="230" height="14" fill="#2563EB"/>
  <text x="399" y="108" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">MERIT</text>

  <text x="300" y="144" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#1D4ED8">DESCRIPTOR</text>
  <text x="300" y="160" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">All LOs met + merit descriptors:</text>
  <text x="300" y="175" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">analysis · argument · wider</text>
  <text x="300" y="190" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">reading engagement.</text>

  <line x1="300" y1="202" x2="498" y2="202" stroke="#BFDBFE" stroke-width="1"/>

  <text x="300" y="218" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#1D4ED8">WHAT THE ASSESSOR CHECKS</text>
  <text x="300" y="234" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">✓ Analysis of causes &amp; effects</text>
  <text x="300" y="249" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">✓ Coherent connected argument</text>
  <text x="300" y="264" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">✓ Sources beyond core texts</text>
  <text x="300" y="279" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">✓ Evidence → conclusion link</text>

  <line x1="300" y1="292" x2="498" y2="292" stroke="#BFDBFE" stroke-width="1"/>

  <text x="300" y="308" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#DC2626">MOST COMMON FAILURE</text>
  <text x="300" y="324" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">Addresses LOs descriptively</text>
  <text x="300" y="339" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">without demonstrating</text>
  <text x="300" y="354" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">analysis or argument.</text>

  <!-- DISTINCTION Card -->
  <rect x="540" y="82" width="232" height="330" rx="10" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1.5"/>
  <rect x="540" y="82" width="232" height="40" rx="10" fill="#D97706"/>
  <rect x="540" y="108" width="232" height="14" fill="#D97706"/>
  <text x="656" y="108" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">DISTINCTION</text>

  <text x="556" y="144" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#92400E">DESCRIPTOR</text>
  <text x="556" y="160" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">All LOs + Merit + Distinction:</text>
  <text x="556" y="175" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">critical eval · synthesis ·</text>
  <text x="556" y="190" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">evidence-based recommendations.</text>

  <line x1="556" y1="202" x2="756" y2="202" stroke="#FDE68A" stroke-width="1"/>

  <text x="556" y="218" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#92400E">WHAT THE ASSESSOR CHECKS</text>
  <text x="556" y="234" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">✓ Competing models evaluated</text>
  <text x="556" y="249" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">✓ Multiple sources synthesised</text>
  <text x="556" y="264" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">✓ Specific recommendations</text>
  <text x="556" y="279" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">✓ Evidence supports rec.</text>

  <line x1="556" y1="292" x2="756" y2="292" stroke="#FDE68A" stroke-width="1"/>

  <text x="556" y="308" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#DC2626">MOST COMMON FAILURE</text>
  <text x="556" y="324" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">Meets Merit descriptors but</text>
  <text x="556" y="339" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">omits specific evidence-based</text>
  <text x="556" y="354" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">recommendations.</text>

  <!-- Example row -->
  <rect x="28" y="426" width="744" height="84" rx="8" fill="#1B3A6B"/>
  <text x="400" y="446" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#A8C4E0">EXAMPLE — Organisational Culture Unit (Business Management)</text>
  <text x="44" y="464" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#E5E7EB">PASS: Defines culture, lists Handy's four types.</text>
  <text x="44" y="480" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#93C5FD">MERIT: Analyses how culture affects performance in a named organisation with referenced evidence.</text>
  <text x="44" y="496" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#FCD34D">DISTINCTION: Critically evaluates Handy vs Schein, identifies which is most applicable, recommends a change strategy with evidence.</text>

  <!-- Footer -->
  <text x="400" y="548" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#9CA3AF">ATHE Assignment Help Service · Harvard referencing compulsory from Level 4</text>
</svg>
