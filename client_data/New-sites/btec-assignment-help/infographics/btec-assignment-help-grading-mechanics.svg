<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" width="100%" role="img" aria-labelledby="btec-hub-title">
  <title id="btec-hub-title">BTEC Grading Mechanics: Pass, Merit, and Distinction Criteria with Internal and External Assessment Rules</title>

  <!-- Background -->
  <rect width="800" height="560" fill="#F4F7FB" rx="14"/>

  <!-- Header -->
  <rect width="800" height="64" fill="#1B3A6B" rx="14"/>
  <rect y="50" width="800" height="14" fill="#1B3A6B"/>
  <text x="400" y="28" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#FFFFFF">BTEC Grading Mechanics: Pass · Merit · Distinction</text>
  <text x="400" y="52" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#A8C4E0">Criterion-Referenced Grading — National (Level 3) · HNC (Level 4) · HND (Level 5)</text>

  <!-- PASS Column -->
  <rect x="28" y="82" width="232" height="310" rx="10" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.5"/>
  <rect x="28" y="82" width="232" height="40" rx="10" fill="#4B5563"/>
  <rect x="28" y="108" width="232" height="14" fill="#4B5563"/>
  <text x="144" y="108" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">PASS</text>
  <text x="44" y="146" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#4B5563">WHAT IS REQUIRED</text>
  <text x="44" y="162" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">All Pass criteria met.</text>
  <text x="44" y="177" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">Task complete. Subject</text>
  <text x="44" y="192" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">knowledge demonstrated.</text>
  <line x1="44" y1="204" x2="244" y2="204" stroke="#E5E7EB" stroke-width="1"/>
  <text x="44" y="220" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#4B5563">CRITERION VERBS</text>
  <text x="44" y="236" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">describe · identify</text>
  <text x="44" y="251" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">outline · explain</text>
  <line x1="44" y1="263" x2="244" y2="263" stroke="#E5E7EB" stroke-width="1"/>
  <text x="44" y="279" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#DC2626">CRITICAL RULE</text>
  <text x="44" y="295" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">Missing ONE Pass criterion</text>
  <text x="44" y="310" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">= Referral — regardless</text>
  <text x="44" y="325" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">of Distinction-quality work</text>
  <text x="44" y="340" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">elsewhere in the unit.</text>
  <line x1="44" y1="353" x2="244" y2="353" stroke="#E5E7EB" stroke-width="1"/>
  <text x="44" y="369" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#6B7280">National: no Harvard required</text>
  <text x="44" y="383" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#6B7280">HNC/HND: Harvard mandatory</text>

  <!-- MERIT Column -->
  <rect x="284" y="82" width="232" height="310" rx="10" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5"/>
  <rect x="284" y="82" width="232" height="40" rx="10" fill="#2563EB"/>
  <rect x="284" y="108" width="232" height="14" fill="#2563EB"/>
  <text x="400" y="108" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">MERIT</text>
  <text x="300" y="146" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#1D4ED8">WHAT IS REQUIRED</text>
  <text x="300" y="162" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">All Pass criteria PLUS all</text>
  <text x="300" y="177" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">Merit criteria met.</text>
  <text x="300" y="192" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">Structured analysis required.</text>
  <line x1="300" y1="204" x2="500" y2="204" stroke="#BFDBFE" stroke-width="1"/>
  <text x="300" y="220" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#1D4ED8">CRITERION VERBS</text>
  <text x="300" y="236" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">analyse · compare</text>
  <text x="300" y="251" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">discuss · assess</text>
  <line x1="300" y1="263" x2="500" y2="263" stroke="#BFDBFE" stroke-width="1"/>
  <text x="300" y="279" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#1D4ED8">WHAT ANALYSIS MEANS</text>
  <text x="300" y="295" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">Cause and effect reasoning.</text>
  <text x="300" y="310" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">Apply theory to scenario.</text>
  <text x="300" y="325" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">Compare two approaches.</text>
  <text x="300" y="340" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">Build a logical argument.</text>
  <line x1="300" y1="353" x2="500" y2="353" stroke="#BFDBFE" stroke-width="1"/>
  <text x="300" y="369" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#6B7280">HNC: 3–5+ academic sources</text>
  <text x="300" y="383" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#6B7280">HND: 8–12+ academic sources</text>

  <!-- DISTINCTION Column -->
  <rect x="540" y="82" width="232" height="310" rx="10" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1.5"/>
  <rect x="540" y="82" width="232" height="40" rx="10" fill="#D97706"/>
  <rect x="540" y="108" width="232" height="14" fill="#D97706"/>
  <text x="656" y="108" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">DISTINCTION</text>
  <text x="556" y="146" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#92400E">WHAT IS REQUIRED</text>
  <text x="556" y="162" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">All Pass + Merit + Distinction</text>
  <text x="556" y="177" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">criteria met. Evaluation +</text>
  <text x="556" y="192" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">justified recommendations.</text>
  <line x1="556" y1="204" x2="756" y2="204" stroke="#FDE68A" stroke-width="1"/>
  <text x="556" y="220" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#92400E">CRITERION VERBS</text>
  <text x="556" y="236" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">evaluate · critically evaluate</text>
  <text x="556" y="251" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">justify · synthesise</text>
  <line x1="556" y1="263" x2="756" y2="263" stroke="#FDE68A" stroke-width="1"/>
  <text x="556" y="279" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#92400E">WHAT EVALUATION MEANS</text>
  <text x="556" y="295" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">Weigh evidence both sides.</text>
  <text x="556" y="310" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">Engage with limitations.</text>
  <text x="556" y="325" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">Synthesise frameworks.</text>
  <text x="556" y="340" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">Reach a justified position.</text>
  <line x1="556" y1="353" x2="756" y2="353" stroke="#FDE68A" stroke-width="1"/>
  <text x="556" y="369" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#6B7280">HNC: 5–8+ sources (journals)</text>
  <text x="556" y="383" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#6B7280">HND: 12–18+ peer-reviewed</text>

  <!-- Assessment type row -->
  <rect x="28" y="406" width="744" height="90" rx="8" fill="#1B3A6B"/>
  <text x="400" y="424" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">Assessment Types: Internal vs External</text>
  <text x="44" y="444" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#E5E7EB">INTERNAL: Tutor-set · Internally Verified · Externally Moderated by Pearson → ONE resubmission on Referral</text>
  <text x="44" y="460" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#FCD34D">EXTERNAL: Pearson-set · Pearson-marked · Sat at centre on scheduled date → NO resubmission — must resit next window</text>
  <text x="44" y="476" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#A8C4E0">All HNC and HND assessment is internal. External assessment exists on specific National units (e.g., Business Environment).</text>
  <text x="44" y="492" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#E5E7EB">Referral = failed to meet one or more Pass criteria. Resubmission targets only unmet criteria — not the full assignment.</text>

  <!-- Footer -->
  <text x="400" y="550" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#9CA3AF">BTEC Assignment Help Service · Pearson BTEC — National (Level 3) · HNC (Level 4) · HND (Level 5)</text>
</svg>
