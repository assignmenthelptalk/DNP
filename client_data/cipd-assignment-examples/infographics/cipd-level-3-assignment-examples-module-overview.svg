<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" role="img" aria-labelledby="l3-infographic-title">
  <title id="l3-infographic-title">CIPD Level 3 Foundation Certificate in People Practice — Complete Module Overview</title>

  <!-- Background -->
  <rect width="800" height="500" fill="#F5F5F5" rx="12"/>

  <!-- Header band -->
  <rect x="0" y="0" width="800" height="72" fill="#1A1A2E" rx="12"/>
  <rect x="0" y="52" width="800" height="20" fill="#1A1A2E"/>
  <text x="400" y="30" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#FFFFFF">CIPD Level 3 Foundation Certificate in People Practice</text>
  <text x="400" y="55" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#E94560">Complete Module Overview</text>

  <!-- Three column headers -->
  <!-- Core Units -->
  <rect x="20" y="82" width="240" height="36" fill="#1A1A2E" rx="6"/>
  <text x="140" y="98" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">CORE UNITS</text>
  <text x="140" y="113" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#E94560">All students — mandatory</text>

  <!-- HR Pathway -->
  <rect x="278" y="82" width="237" height="36" fill="#16213E" rx="6"/>
  <text x="396" y="98" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">HR PATHWAY</text>
  <text x="396" y="113" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#E94560">People Practice specialism</text>

  <!-- L&D Pathway -->
  <rect x="533" y="82" width="247" height="36" fill="#16213E" rx="6"/>
  <text x="656" y="98" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">L&amp;D PATHWAY</text>
  <text x="656" y="113" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#E94560">People Development specialism</text>

  <!-- Core unit cards -->
  <!-- 3CO01 -->
  <rect x="20" y="128" width="240" height="70" fill="#FFFFFF" rx="6" stroke="#1A1A2E" stroke-width="1.5"/>
  <text x="140" y="150" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#E94560">3CO01</text>
  <text x="140" y="168" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#2C2C2C">Business, Culture and Change in Context</text>
  <text x="140" y="184" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#888888">Connects to 5CO01 at Level 5</text>

  <!-- 3CO02 -->
  <rect x="20" y="206" width="240" height="70" fill="#FFFFFF" rx="6" stroke="#1A1A2E" stroke-width="1.5"/>
  <text x="140" y="228" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#E94560">3CO02</text>
  <text x="140" y="246" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#2C2C2C">Principles of Analytics</text>
  <text x="140" y="262" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#888888">Connects to 5CO02 at Level 5</text>

  <!-- 3CO03 -->
  <rect x="20" y="284" width="240" height="70" fill="#FFFFFF" rx="6" stroke="#1A1A2E" stroke-width="1.5"/>
  <text x="140" y="306" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#E94560">3CO03</text>
  <text x="140" y="322" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#2C2C2C">Core Behaviours for People Professionals</text>
  <text x="140" y="338" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#888888">CIPD Profession Map behaviours</text>

  <!-- 3CO04 -->
  <rect x="20" y="362" width="240" height="70" fill="#FFFFFF" rx="6" stroke="#1A1A2E" stroke-width="1.5"/>
  <text x="140" y="384" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#E94560">3CO04</text>
  <text x="140" y="400" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#2C2C2C">Essentials of People Practice</text>
  <text x="140" y="416" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#888888">Recruitment, reward, employment law basics</text>

  <!-- HR Pathway cards -->
  <!-- 3HR01 -->
  <rect x="278" y="128" width="237" height="70" fill="#FFFFFF" rx="6" stroke="#16213E" stroke-width="1.5"/>
  <text x="396" y="150" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#1A1A2E">3HR01</text>
  <text x="396" y="168" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#2C2C2C">Supporting Good Practice in Performance</text>
  <text x="396" y="182" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#2C2C2C">and Reward Management</text>
  <text x="396" y="196" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#888888">Connects to 5HR03 at Level 5</text>

  <!-- 3HR02 -->
  <rect x="278" y="206" width="237" height="70" fill="#FFFFFF" rx="6" stroke="#16213E" stroke-width="1.5"/>
  <text x="396" y="228" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#1A1A2E">3HR02</text>
  <text x="396" y="246" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#2C2C2C">Supporting Good Practice in Managing</text>
  <text x="396" y="260" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#2C2C2C">Employment Relations</text>
  <text x="396" y="274" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#888888">Connects to 5HR01 at Level 5</text>

  <!-- Grading note for HR -->
  <rect x="278" y="295" width="237" height="50" fill="#1A1A2E" rx="6"/>
  <text x="396" y="315" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">Grading: Pass / Refer Only</text>
  <text x="396" y="333" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#E94560">No merit or distinction at Level 3</text>

  <!-- Word count box for HR -->
  <rect x="278" y="355" width="237" height="77" fill="#FFFFFF" rx="6" stroke="#CCCCCC" stroke-width="1"/>
  <text x="396" y="376" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#1A1A2E">Word Count per Unit</text>
  <text x="396" y="394" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#2C2C2C">1,500 – 2,500 words total</text>
  <text x="396" y="411" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#2C2C2C">500–1,200 words per activity</text>
  <text x="396" y="425" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#888888">Follow your centre's assessment brief</text>

  <!-- L&D Pathway card -->
  <!-- 3LD02 -->
  <rect x="533" y="128" width="247" height="70" fill="#FFFFFF" rx="6" stroke="#16213E" stroke-width="1.5"/>
  <text x="656" y="150" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#1A1A2E">3LD02</text>
  <text x="656" y="168" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#2C2C2C">Supporting Individual Learning</text>
  <text x="656" y="182" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#2C2C2C">and Development</text>
  <text x="656" y="196" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#888888">Connects to 5LD01 at Level 5</text>

  <!-- Qualification summary box -->
  <rect x="533" y="210" width="247" height="222" fill="#1A1A2E" rx="8"/>
  <text x="656" y="235" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#E94560">Qualification Summary</text>
  <text x="656" y="258" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#FFFFFF">Level 3 on RQF (England/Wales)</text>
  <text x="656" y="276" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#FFFFFF">Equivalent to A-Level standard</text>
  <line x1="553" y1="287" x2="760" y2="287" stroke="#E94560" stroke-width="1"/>
  <text x="656" y="305" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#FFFFFF">Awards Foundation CIPD</text>
  <text x="656" y="321" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#FFFFFF">Membership on completion</text>
  <line x1="553" y1="332" x2="760" y2="332" stroke="#E94560" stroke-width="1"/>
  <text x="656" y="350" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#FFFFFF">Duration: 9–12 months</text>
  <text x="656" y="367" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#FFFFFF">part-time study</text>
  <line x1="553" y1="378" x2="760" y2="378" stroke="#E94560" stroke-width="1"/>
  <text x="656" y="396" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#FFFFFF">No prior HR experience</text>
  <text x="656" y="412" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#FFFFFF">required to enrol</text>

  <!-- Footer -->
  <text x="400" y="488" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#999">cipdassignmentexamples.com</text>
</svg>
