<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 660" width="900" height="660">
  <defs>
    <marker id="arr-fwd" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e3a5f"/>
    </marker>
    <marker id="arr-back" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7f8c8d"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="660" fill="#f5f7fa"/>

  <!-- Header -->
  <rect width="900" height="66" fill="#1e3a5f"/>
  <text x="450" y="35" font-family="Arial,Helvetica,sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">The Insurance Underwriting Cycle</text>
  <text x="450" y="55" font-family="Arial,Helvetica,sans-serif" font-size="13" fill="#a8c4e0" text-anchor="middle">530 Economics and Business | CII Diploma in Insurance</text>

  <!-- Phase label row -->
  <text x="113" y="94" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="bold" fill="#2980b9" text-anchor="middle">PHASE 1</text>
  <text x="337" y="94" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="bold" fill="#e74c3c" text-anchor="middle">PHASE 2</text>
  <text x="563" y="94" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="bold" fill="#c0392b" text-anchor="middle">PHASE 3</text>
  <text x="787" y="94" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="bold" fill="#1e8449" text-anchor="middle">PHASE 4</text>

  <!-- ── PHASE 1: SOFT MARKET ── -->
  <rect x="15" y="106" width="196" height="306" rx="6" fill="white" stroke="#2980b9" stroke-width="2.5"/>
  <rect x="15" y="106" width="196" height="40" rx="5" fill="#2980b9"/>
  <text x="113" y="131" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">SOFT MARKET</text>

  <text x="113" y="164" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="bold" fill="#2980b9" text-anchor="middle">CONDITIONS:</text>
  <text x="113" y="182" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#444" text-anchor="middle">↓ Falling premium rates</text>
  <text x="113" y="198" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#444" text-anchor="middle">↑ Excess capital in market</text>
  <text x="113" y="214" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#444" text-anchor="middle">↑ High insurer capacity</text>
  <text x="113" y="230" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#444" text-anchor="middle">↓ Relaxed underwriting</text>
  <text x="113" y="246" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#444" text-anchor="middle">↑ Broad coverage terms</text>
  <text x="113" y="262" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#444" text-anchor="middle">↑ New entrant growth</text>

  <line x1="35" y1="276" x2="191" y2="276" stroke="#ddd" stroke-width="1"/>
  <text x="113" y="294" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="bold" fill="#c0392b" text-anchor="middle">RESULT:</text>
  <text x="113" y="311" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#555" text-anchor="middle">Combined ratios rise as</text>
  <text x="113" y="327" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#555" text-anchor="middle">premiums fall vs claims</text>
  <text x="113" y="343" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#777" font-style="italic" text-anchor="middle">e.g. 2013–2019</text>
  <text x="113" y="358" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#777" font-style="italic" text-anchor="middle">personal motor market</text>
  <text x="113" y="374" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#777" font-style="italic" text-anchor="middle">UK commercial lines</text>
  <text x="113" y="395" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#777" font-style="italic" text-anchor="middle">2013–2018</text>

  <!-- ── ARROW 1→2 ── -->
  <line x1="211" y1="259" x2="239" y2="259" stroke="#1e3a5f" stroke-width="2.5" marker-end="url(#arr-fwd)"/>

  <!-- ── PHASE 2: TRIGGER EVENTS ── -->
  <rect x="239" y="106" width="196" height="306" rx="6" fill="white" stroke="#e74c3c" stroke-width="2.5"/>
  <rect x="239" y="106" width="196" height="40" rx="5" fill="#e74c3c"/>
  <text x="337" y="131" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">TRIGGER EVENTS</text>

  <text x="337" y="164" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="bold" fill="#e74c3c" text-anchor="middle">WHAT BREAKS THE SOFT MARKET:</text>
  <text x="337" y="184" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#444" text-anchor="middle">→ Major catastrophe loss</text>
  <text x="337" y="200" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#444" text-anchor="middle">  (hurricane, flood, earthquake)</text>
  <text x="337" y="220" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#444" text-anchor="middle">→ Investment market downturn</text>
  <text x="337" y="236" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#444" text-anchor="middle">  (capital depleted)</text>
  <text x="337" y="256" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#444" text-anchor="middle">→ Large liability loss</text>
  <text x="337" y="272" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#444" text-anchor="middle">  accumulation / reserve deficiency</text>
  <text x="337" y="292" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#444" text-anchor="middle">→ Reinsurance capital withdrawal</text>

  <line x1="259" y1="308" x2="415" y2="308" stroke="#ddd" stroke-width="1"/>
  <text x="337" y="326" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="bold" fill="#555" text-anchor="middle">REAL EXAMPLES:</text>
  <text x="337" y="344" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#777" font-style="italic" text-anchor="middle">9/11 (2001)</text>
  <text x="337" y="360" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#777" font-style="italic" text-anchor="middle">Hurricane Katrina (2005)</text>
  <text x="337" y="376" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#777" font-style="italic" text-anchor="middle">COVID-19 pandemic (2020)</text>
  <text x="337" y="392" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#777" font-style="italic" text-anchor="middle">GFC investment losses (2008)</text>

  <!-- ── ARROW 2→3 ── -->
  <line x1="435" y1="259" x2="463" y2="259" stroke="#1e3a5f" stroke-width="2.5" marker-end="url(#arr-fwd)"/>

  <!-- ── PHASE 3: HARD MARKET ── -->
  <rect x="463" y="106" width="196" height="306" rx="6" fill="white" stroke="#c0392b" stroke-width="2.5"/>
  <rect x="463" y="106" width="196" height="40" rx="5" fill="#c0392b"/>
  <text x="561" y="131" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">HARD MARKET</text>

  <text x="561" y="164" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="bold" fill="#c0392b" text-anchor="middle">CONDITIONS:</text>
  <text x="561" y="182" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#444" text-anchor="middle">↑ Rising premium rates sharply</text>
  <text x="561" y="198" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#444" text-anchor="middle">↓ Reduced market capacity</text>
  <text x="561" y="214" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#444" text-anchor="middle">↑ Tight underwriting standards</text>
  <text x="561" y="230" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#444" text-anchor="middle">↑ Restrictive coverage terms</text>
  <text x="561" y="246" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#444" text-anchor="middle">↑ High excess/retention levels</text>
  <text x="561" y="262" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#444" text-anchor="middle">↓ Some insurers exit market</text>

  <line x1="483" y1="276" x2="639" y2="276" stroke="#ddd" stroke-width="1"/>
  <text x="561" y="294" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="bold" fill="#1e8449" text-anchor="middle">RESULT:</text>
  <text x="561" y="311" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#555" text-anchor="middle">Combined ratios improve</text>
  <text x="561" y="327" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#555" text-anchor="middle">as premium income rises</text>
  <text x="561" y="343" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#777" font-style="italic" text-anchor="middle">e.g. 2020–2023</text>
  <text x="561" y="359" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#777" font-style="italic" text-anchor="middle">cyber, D&O, liability</text>
  <text x="561" y="375" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#777" font-style="italic" text-anchor="middle">property catastrophe</text>

  <!-- ── ARROW 3→4 ── -->
  <line x1="659" y1="259" x2="687" y2="259" stroke="#1e3a5f" stroke-width="2.5" marker-end="url(#arr-fwd)"/>

  <!-- ── PHASE 4: RECOVERY ── -->
  <rect x="687" y="106" width="196" height="306" rx="6" fill="white" stroke="#1e8449" stroke-width="2.5"/>
  <rect x="687" y="106" width="196" height="40" rx="5" fill="#1e8449"/>
  <text x="785" y="131" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">RECOVERY</text>

  <text x="785" y="164" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="bold" fill="#1e8449" text-anchor="middle">CONDITIONS:</text>
  <text x="785" y="182" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#444" text-anchor="middle">↑ Hard market profitability</text>
  <text x="785" y="198" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#444" text-anchor="middle">  attracts new capital</text>
  <text x="785" y="216" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#444" text-anchor="middle">↑ New insurer entrants</text>
  <text x="785" y="232" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#444" text-anchor="middle">↑ Existing insurers raise</text>
  <text x="785" y="248" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#444" text-anchor="middle">  equity; capacity rebuilds</text>
  <text x="785" y="266" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#444" text-anchor="middle">↓ Competitive pressure</text>
  <text x="785" y="282" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#444" text-anchor="middle">  returns; rates stabilise</text>

  <line x1="707" y1="298" x2="863" y2="298" stroke="#ddd" stroke-width="1"/>
  <text x="785" y="316" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="bold" fill="#2980b9" text-anchor="middle">LEADS BACK TO:</text>
  <text x="785" y="333" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#555" text-anchor="middle">Soft market conditions</text>
  <text x="785" y="349" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#555" text-anchor="middle">as capacity outpaces demand</text>
  <text x="785" y="369" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#777" font-style="italic" text-anchor="middle">ILS capital (Insurance-</text>
  <text x="785" y="385" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#777" font-style="italic" text-anchor="middle">Linked Securities) accelerates</text>
  <text x="785" y="401" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#777" font-style="italic" text-anchor="middle">recovery in cat markets</text>

  <!-- CYCLE RETURN ARROW (bottom arc) -->
  <!-- Arrow from Phase 4 bottom-right back to Phase 1 bottom-left -->
  <path d="M 883,412 Q 450,490 15,412" stroke="#7f8c8d" stroke-width="2" fill="none" stroke-dasharray="8,4"/>
  <polygon points="15,412 28,403 22,419" fill="#7f8c8d"/>
  <text x="450" y="480" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#7f8c8d" text-anchor="middle" font-style="italic">Cycle repeats — profitability attracts capital → competition → soft market</text>

  <!-- 530 Exam Note -->
  <rect x="15" y="502" width="870" height="52" rx="5" fill="#1e3a5f"/>
  <text x="450" y="521" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="bold" fill="#e8c96d" text-anchor="middle">530 EXAM TECHNIQUE: Draw the cycle first, label each phase with characteristics,</text>
  <text x="450" y="539" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#a8c4e0" text-anchor="middle">then name specific TRIGGER EVENTS — "losses increase" is insufficient; cite catastrophe type, investment downturn, or reserve deficiency</text>

  <!-- Footer -->
  <rect x="0" y="616" width="900" height="44" fill="#2c3e50"/>
  <text x="450" y="641" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#a8c4e0" text-anchor="middle">CIIAssignmentHelp.com — 530 Economics and Business | CII Diploma in Insurance</text>
</svg>
