<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" role="img" aria-labelledby="celta-kolb-title">
  <title id="celta-kolb-title">CELTA Assignment 4 Kolb Experiential Learning Cycle and Schon Reflective Framework: Description vs Critical Reflection, Pattern Identification, and ELT Theory Integration</title>

  <!-- Background -->
  <rect width="800" height="600" fill="#F4F7FB" rx="14"/>

  <!-- Header -->
  <rect width="800" height="64" fill="#1B3A6B" rx="14"/>
  <rect y="50" width="800" height="14" fill="#1B3A6B"/>
  <text x="400" y="28" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF">CELTA Assignment 4: Critical Reflection Frameworks</text>
  <text x="400" y="52" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#A8C4E0">Kolb (1984) ELC · Schon (1983) · Pattern Across ≥2 TP Lessons · NOT Gibbs (1988)</text>

  <!-- Kolb cycle: 4 stages -->
  <rect x="28" y="82" width="744" height="22" rx="4" fill="#2563EB"/>
  <text x="400" y="97" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">KOLB (1984) EXPERIENTIAL LEARNING CYCLE — Apply all four stages to the identified TP pattern</text>

  <rect x="28" y="112" width="178" height="130" rx="6" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="1.5"/>
  <rect x="28" y="112" width="178" height="28" rx="6" fill="#1B3A6B"/>
  <rect x="28" y="126" width="178" height="14" fill="#1B3A6B"/>
  <text x="117" y="127" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">1. CONCRETE EXPERIENCE</text>
  <text x="44" y="154" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#374151">Specific TP incident(s) that</text>
  <text x="44" y="167" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#374151">form the starting point</text>
  <text x="44" y="181" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#374151">Minimum: 2 TP lessons</text>
  <text x="44" y="195" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#374151">Evidence: tutor feedback + reflection notes</text>
  <text x="44" y="232" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" fill="#D97706">Must be a PATTERN — not isolated event</text>

  <rect x="218" y="112" width="178" height="130" rx="6" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="1.5"/>
  <rect x="218" y="112" width="178" height="28" rx="6" fill="#2563EB"/>
  <rect x="218" y="126" width="178" height="14" fill="#2563EB"/>
  <text x="307" y="127" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">2. REFLECTIVE OBSERVATION</text>
  <text x="234" y="154" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#374151">Examine what happened from</text>
  <text x="234" y="167" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#374151">multiple perspectives</text>
  <text x="234" y="181" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#374151">Teacher view + learner response</text>
  <text x="234" y="195" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#374151">+ tutor observer feedback</text>
  <text x="234" y="232" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" fill="#D97706">Quote tutor observation feedback directly</text>

  <rect x="408" y="112" width="178" height="130" rx="6" fill="#FFFFFF" stroke="#DDD6FE" stroke-width="1.5"/>
  <rect x="408" y="112" width="178" height="28" rx="6" fill="#7C3AED"/>
  <rect x="408" y="126" width="178" height="14" fill="#7C3AED"/>
  <text x="497" y="127" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">3. ABSTRACT CONCEPTUALISATION</text>
  <text x="424" y="154" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#374151">ELT theory applied to explain WHY</text>
  <text x="424" y="167" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#374151">Vygotsky (1978) ZPD / Scaffolding</text>
  <text x="424" y="181" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#374151">Krashen (1982) Input / Affective Filter</text>
  <text x="424" y="195" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#374151">Willis (1996) TBL · Scrivener (2011)</text>
  <text x="424" y="232" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" fill="#DC2626">Theory must EXPLAIN the event — not just be cited</text>

  <rect x="598" y="112" width="174" height="130" rx="6" fill="#FFFFFF" stroke="#DDD6FE" stroke-width="1.5"/>
  <rect x="598" y="112" width="174" height="28" rx="6" fill="#7C3AED"/>
  <rect x="598" y="126" width="174" height="14" fill="#7C3AED"/>
  <text x="685" y="127" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">4. ACTIVE EXPERIMENTATION</text>
  <text x="614" y="154" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#374151">Concrete change for next TP lesson</text>
  <text x="614" y="167" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#374151">Name specific task redesign</text>
  <text x="614" y="181" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#374151">Justify with theory from Stage 3</text>
  <text x="614" y="195" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#374151">State expected outcome</text>
  <text x="614" y="232" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" fill="#DC2626">"I will improve" is NOT an action plan</text>

  <!-- Description vs Reflection panel -->
  <rect x="28" y="258" width="744" height="22" rx="4" fill="#D97706"/>
  <text x="400" y="273" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">DESCRIPTION vs CRITICAL REFLECTION — The most common Assignment 4 criterion failure</text>

  <rect x="28" y="288" width="358" height="110" rx="6" fill="#FEF2F2" stroke="#FECACA" stroke-width="1.5"/>
  <text x="44" y="306" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#DC2626">DESCRIPTION (refer-level)</text>
  <text x="44" y="321" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#374151">"In lesson 3, I set a role play. Learners</text>
  <text x="44" y="335" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#374151">spoke in L1. I stopped the activity and</text>
  <text x="44" y="349" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#374151">reminded them to use English."</text>
  <text x="44" y="368" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" font-weight="700" fill="#DC2626">Answers: WHAT happened. Not WHY or WHAT NEXT.</text>
  <text x="44" y="383" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#6B7280">No theory. No pattern identification. No implications.</text>

  <rect x="414" y="288" width="358" height="110" rx="6" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="430" y="306" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#2563EB">CRITICAL REFLECTION (pass B / A level)</text>
  <text x="430" y="321" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#374151">"L1 use in lessons 2 and 3 suggests</text>
  <text x="430" y="335" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#374151">communicative demand exceeded learner</text>
  <text x="430" y="349" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#374151">competence. Vygotsky's (1978) ZPD explains</text>
  <text x="430" y="363" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#374151">the gap; Willis (1996) TBL predicts that an</text>
  <text x="430" y="377" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#374151">information gap with defined outcome will...</text>
  <text x="430" y="392" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" font-weight="700" fill="#2563EB">Answers: WHY + PATTERN + THEORY + WHAT NEXT</text>

  <!-- Schon panel -->
  <rect x="28" y="412" width="358" height="70" rx="6" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="44" y="430" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#1D4ED8">SCHON (1983): TWO MODES</text>
  <text x="44" y="446" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#374151">Reflection-in-Action: real-time adjustment DURING lesson</text>
  <text x="44" y="460" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#374151">Reflection-on-Action: structured analysis AFTER lesson</text>
  <text x="44" y="474" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" font-weight="700" fill="#D97706">Both modes required — evidence both in Assignment 4</text>

  <!-- Gibbs warning -->
  <rect x="414" y="412" width="358" height="70" rx="6" fill="#FEF2F2" stroke="#FECACA" stroke-width="1.5"/>
  <text x="430" y="430" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#DC2626">GIBBS (1988) — DO NOT USE AS PRIMARY FRAMEWORK</text>
  <text x="430" y="446" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#374151">Gibbs Reflective Cycle is for: nursing portfolios, CACHE</text>
  <text x="430" y="460" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#374151">assignments, social care reflective accounts</text>
  <text x="430" y="474" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" font-weight="700" fill="#DC2626">Using Gibbs for CELTA signals unfamiliarity with ELT reflective methodology</text>

  <!-- ELT Theory bar -->
  <rect x="28" y="494" width="744" height="30" rx="6" fill="#1B3A6B"/>
  <text x="400" y="514" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">ELT Theory for Stage 3: Krashen (1982) · Vygotsky (1978) · Willis (1996) · Scrivener (2011:14/250) · Harmer · Thornbury</text>

  <!-- Footer -->
  <text x="400" y="590" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#9CA3AF">CELTA Assignment Help Service · Cambridge CELTA Assignment 4 — Lessons from the Classroom</text>
</svg>
