<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="100%" role="img" aria-labelledby="3co02-infographic-title">
  <title id="3co02-infographic-title">3CO02 CIPD Level 3 — HR Data Types: Quantitative vs Qualitative, Primary vs Secondary</title>
  <rect width="800" height="460" fill="#F5F5F5" rx="12"/>
  <!-- Header -->
  <rect x="0" y="0" width="800" height="60" fill="#1A1A2E" rx="12"/>
  <rect x="0" y="44" width="800" height="16" fill="#1A1A2E"/>
  <text x="400" y="25" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">3CO02 — Types of Data Used in People Practice</text>
  <text x="400" y="48" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#E94560">CIPD Level 3 · Principles of Analytics · AC 1.1</text>

  <!-- Column headers -->
  <rect x="20" y="74" width="1" height="1" fill="none"/>
  <!-- Left axis label -->
  <text x="400" y="86" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#1A1A2E">2x2 Matrix — Data Source × Data Type</text>

  <!-- Column labels -->
  <rect x="210" y="98" width="235" height="30" fill="#1A1A2E" rx="6"/>
  <text x="327" y="118" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">QUANTITATIVE</text>

  <rect x="455" y="98" width="325" height="30" fill="#16213E" rx="6"/>
  <text x="617" y="118" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">QUALITATIVE</text>

  <!-- Row labels (rotated effect using positioned text) -->
  <rect x="20" y="138" width="180" height="130" fill="#E94560" rx="6"/>
  <text x="110" y="190" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">PRIMARY</text>
  <text x="110" y="210" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#FFFFFF">Collected directly</text>
  <text x="110" y="225" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#FFFFFF">for a specific purpose</text>
  <text x="110" y="248" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#FFCCCC">Time: High · Specific</text>

  <rect x="20" y="278" width="180" height="130" fill="#1A1A2E" rx="6"/>
  <text x="110" y="330" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">SECONDARY</text>
  <text x="110" y="350" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#AAAAAA">Already exists —</text>
  <text x="110" y="365" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#AAAAAA">repurposed for use</text>
  <text x="110" y="388" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#888888">Time: Low · General</text>

  <!-- Quadrant 1: Primary Quantitative -->
  <rect x="210" y="138" width="235" height="130" fill="#FFFFFF" rx="6" stroke="#E94560" stroke-width="2"/>
  <text x="327" y="162" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#E94560">Primary Quantitative</text>
  <text x="225" y="182" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#2C2C2C">· Designed engagement survey</text>
  <text x="225" y="198" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#2C2C2C">  (% scores)</text>
  <text x="225" y="214" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#2C2C2C">· Attendance tracking sheet</text>
  <text x="225" y="230" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#2C2C2C">· Bespoke pulse survey results</text>
  <text x="225" y="248" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#888888">Current · Specific · Resource-intensive</text>

  <!-- Quadrant 2: Primary Qualitative -->
  <rect x="455" y="138" width="325" height="130" fill="#FFFFFF" rx="6" stroke="#16213E" stroke-width="2"/>
  <text x="617" y="162" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#1A1A2E">Primary Qualitative</text>
  <text x="470" y="182" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#2C2C2C">· Exit interview discussions</text>
  <text x="470" y="198" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#2C2C2C">· Focus groups on new onboarding</text>
  <text x="470" y="214" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#2C2C2C">· Open-text survey responses</text>
  <text x="470" y="230" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#2C2C2C">· 360-degree feedback narratives</text>
  <text x="470" y="248" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#888888">Rich insight · Context-specific · Harder to aggregate</text>

  <!-- Quadrant 3: Secondary Quantitative -->
  <rect x="210" y="278" width="235" height="130" fill="#FFFFFF" rx="6" stroke="#1A1A2E" stroke-width="2"/>
  <text x="327" y="302" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#1A1A2E">Secondary Quantitative</text>
  <text x="225" y="322" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#2C2C2C">· HRIS absence and turnover data</text>
  <text x="225" y="338" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#2C2C2C">· Payroll records (cost data)</text>
  <text x="225" y="354" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#2C2C2C">· ONS labour market statistics</text>
  <text x="225" y="370" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#2C2C2C">· Salary benchmarking reports</text>
  <text x="225" y="388" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#888888">Fast to access · May not match exact question</text>

  <!-- Quadrant 4: Secondary Qualitative -->
  <rect x="455" y="278" width="325" height="130" fill="#FFFFFF" rx="6" stroke="#16213E" stroke-width="2"/>
  <text x="617" y="302" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#1A1A2E">Secondary Qualitative</text>
  <text x="470" y="322" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#2C2C2C">· CIPD factsheet research findings</text>
  <text x="470" y="338" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#2C2C2C">· Industry case studies</text>
  <text x="470" y="354" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#2C2C2C">· Academic HR journal articles</text>
  <text x="470" y="370" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#2C2C2C">· Government research reports</text>
  <text x="470" y="388" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#888888">Context from others · Support evidence base at L3</text>

  <!-- Key insight bar -->
  <rect x="20" y="422" width="760" height="30" fill="#1A1A2E" rx="6"/>
  <text x="400" y="437" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#E94560" font-weight="700">Key principle: </text>
  <text x="455" y="437" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#FFFFFF">Quantitative data tells you WHAT is happening · Qualitative data tells you WHY · Both are needed for evidence-based decisions</text>

  <!-- Footer -->
  <text x="400" y="452" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#999">cipdassignmentexamples.com</text>
</svg>
