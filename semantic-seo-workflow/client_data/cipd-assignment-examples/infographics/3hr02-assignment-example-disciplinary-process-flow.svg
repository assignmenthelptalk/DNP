<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" role="img" aria-labelledby="3hr02-infographic-title">
  <title id="3hr02-infographic-title">3HR02 CIPD Level 3 — ACAS Fair Disciplinary Procedure: Five-Step Process</title>
  <rect width="800" height="500" fill="#F5F5F5" rx="12"/>
  <!-- Header -->
  <rect x="0" y="0" width="800" height="60" fill="#1A1A2E" rx="12"/>
  <rect x="0" y="44" width="800" height="16" fill="#1A1A2E"/>
  <text x="400" y="25" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">3HR02 — Fair Disciplinary Procedure Under the ACAS Code of Practice</text>
  <text x="400" y="48" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#E94560">CIPD Level 3 · Employment Relations · AC 2.2</text>

  <!-- Step boxes — horizontal flow with arrows -->
  <!-- Step 1 -->
  <rect x="20" y="80" width="136" height="300" fill="#1A1A2E" rx="8"/>
  <text x="88" y="108" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#E94560">1</text>
  <text x="88" y="130" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">INVESTIGATE</text>
  <line x1="40" y1="142" x2="136" y2="142" stroke="#E94560" stroke-width="1"/>
  <text x="88" y="162" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#FFFFFF">Gather facts before</text>
  <text x="88" y="177" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#FFFFFF">any formal action.</text>
  <text x="88" y="200" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#AAAAAA">Collect evidence:</text>
  <text x="88" y="215" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#AAAAAA">witness statements,</text>
  <text x="88" y="230" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#AAAAAA">records, CCTV.</text>
  <text x="88" y="252" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#AAAAAA">Use a separate</text>
  <text x="88" y="267" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#AAAAAA">investigator where</text>
  <text x="88" y="282" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#AAAAAA">possible.</text>
  <text x="88" y="305" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#E94560">Not a finding</text>
  <text x="88" y="318" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#E94560">of guilt</text>
  <text x="88" y="358" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#888888">Step 1 of 5</text>

  <!-- Arrow 1-2 -->
  <polygon points="162,230 172,220 172,240" fill="#E94560"/>

  <!-- Step 2 -->
  <rect x="176" y="80" width="136" height="300" fill="#16213E" rx="8"/>
  <text x="244" y="108" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#E94560">2</text>
  <text x="244" y="130" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">NOTIFY</text>
  <line x1="196" y1="142" x2="292" y2="142" stroke="#E94560" stroke-width="1"/>
  <text x="244" y="162" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#FFFFFF">Written invitation</text>
  <text x="244" y="177" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#FFFFFF">to formal hearing.</text>
  <text x="244" y="200" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#AAAAAA">Letter must include:</text>
  <text x="244" y="215" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#AAAAAA">nature of allegation,</text>
  <text x="244" y="230" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#AAAAAA">copy of evidence,</text>
  <text x="244" y="245" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#AAAAAA">date/time of hearing,</text>
  <text x="244" y="260" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#AAAAAA">right to be</text>
  <text x="244" y="275" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#AAAAAA">accompanied.</text>
  <text x="244" y="305" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#E94560">Allow reasonable</text>
  <text x="244" y="318" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#E94560">preparation time</text>
  <text x="244" y="358" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#888888">Step 2 of 5</text>

  <!-- Arrow 2-3 -->
  <polygon points="318,230 328,220 328,240" fill="#E94560"/>

  <!-- Step 3 -->
  <rect x="332" y="80" width="136" height="300" fill="#1A1A2E" rx="8"/>
  <text x="400" y="108" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#E94560">3</text>
  <text x="400" y="130" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">HEARING</text>
  <line x1="352" y1="142" x2="448" y2="142" stroke="#E94560" stroke-width="1"/>
  <text x="400" y="162" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#FFFFFF">Formal disciplinary</text>
  <text x="400" y="177" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#FFFFFF">meeting held.</text>
  <text x="400" y="200" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#AAAAAA">Statutory right to</text>
  <text x="400" y="215" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#AAAAAA">be accompanied by:</text>
  <text x="400" y="230" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#AAAAAA">Trade union rep or</text>
  <text x="400" y="245" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#AAAAAA">work colleague.</text>
  <text x="400" y="265" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#AAAAAA">Companion can</text>
  <text x="400" y="280" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#AAAAAA">address hearing</text>
  <text x="400" y="295" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#AAAAAA">and ask questions.</text>
  <text x="400" y="345" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#888888">Step 3 of 5</text>

  <!-- Arrow 3-4 -->
  <polygon points="474,230 484,220 484,240" fill="#E94560"/>

  <!-- Step 4 -->
  <rect x="488" y="80" width="136" height="300" fill="#16213E" rx="8"/>
  <text x="556" y="108" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#E94560">4</text>
  <text x="556" y="130" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">DECIDE</text>
  <line x1="508" y1="142" x2="604" y2="142" stroke="#E94560" stroke-width="1"/>
  <text x="556" y="162" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#FFFFFF">Written decision</text>
  <text x="556" y="177" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#FFFFFF">communicated.</text>
  <text x="556" y="200" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#AAAAAA">Possible outcomes:</text>
  <text x="556" y="215" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#AAAAAA">No action,</text>
  <text x="556" y="230" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#AAAAAA">1st written warning,</text>
  <text x="556" y="245" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#AAAAAA">Final written warning,</text>
  <text x="556" y="260" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#AAAAAA">Dismissal.</text>
  <text x="556" y="280" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#AAAAAA">Confirm right</text>
  <text x="556" y="295" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#AAAAAA">of appeal in letter.</text>
  <text x="556" y="345" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#888888">Step 4 of 5</text>

  <!-- Arrow 4-5 -->
  <polygon points="630,230 640,220 640,240" fill="#E94560"/>

  <!-- Step 5 -->
  <rect x="644" y="80" width="136" height="300" fill="#E94560" rx="8"/>
  <text x="712" y="108" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">5</text>
  <text x="712" y="130" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">APPEAL</text>
  <line x1="664" y1="142" x2="760" y2="142" stroke="#FFFFFF" stroke-width="1"/>
  <text x="712" y="162" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#FFFFFF">Every outcome</text>
  <text x="712" y="177" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#FFFFFF">carries right</text>
  <text x="712" y="192" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#FFFFFF">of appeal.</text>
  <text x="712" y="215" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#FFFFFF">Heard by a</text>
  <text x="712" y="230" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#FFFFFF">different manager</text>
  <text x="712" y="245" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#FFFFFF">not involved in</text>
  <text x="712" y="260" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#FFFFFF">original hearing.</text>
  <text x="712" y="280" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#FFFFFF">Same procedural</text>
  <text x="712" y="295" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#FFFFFF">rights apply.</text>
  <text x="712" y="345" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#FFFFFF">Step 5 of 5</text>

  <!-- Warning box at bottom -->
  <rect x="20" y="395" width="760" height="46" fill="#1A1A2E" rx="6"/>
  <text x="400" y="414" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#E94560">ACAS Code of Practice Warning</text>
  <text x="400" y="431" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#FFFFFF">Failure to follow the ACAS Code does not make a dismissal automatically unfair — but employment tribunals can increase any</text>
  <text x="400" y="447" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#FFFFFF">compensation award by up to 25% if the employer unreasonably fails to comply with the Code.</text>

  <!-- Footer -->
  <text x="400" y="490" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#999">cipdassignmentexamples.com</text>
</svg>
