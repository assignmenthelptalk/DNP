<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="100%" role="img" aria-labelledby="3hr01-infographic-title">
  <title id="3hr01-infographic-title">3HR01 CIPD Level 3 — Performance Management Cycle and Motivation Theories</title>
  <rect width="800" height="480" fill="#F5F5F5" rx="12"/>
  <!-- Header -->
  <rect x="0" y="0" width="800" height="60" fill="#1A1A2E" rx="12"/>
  <rect x="0" y="44" width="800" height="16" fill="#1A1A2E"/>
  <text x="400" y="25" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">3HR01 — Performance Management Cycle and Motivation Theories</text>
  <text x="400" y="48" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#E94560">CIPD Level 3 · HR Pathway · AC 1.1 and AC 3.2</text>

  <!-- LEFT: PM Cycle as circular diagram using quadrants -->
  <text x="195" y="88" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#1A1A2E">Performance Management Cycle</text>

  <!-- Circle segments (4 arcs) using rects arranged in quadrant style -->
  <!-- Outer ring background -->
  <circle cx="195" cy="270" r="145" fill="#CCCCCC"/>
  <!-- Inner white circle -->
  <circle cx="195" cy="270" r="65" fill="#FFFFFF"/>
  <!-- Segment 1 (top-right): PLAN — navy -->
  <path d="M195,270 L195,125 A145,145 0 0,1 340,270 Z" fill="#1A1A2E"/>
  <!-- Segment 2 (bottom-right): ACT — dark blue -->
  <path d="M195,270 L340,270 A145,145 0 0,1 195,415 Z" fill="#16213E"/>
  <!-- Segment 3 (bottom-left): REVIEW — red -->
  <path d="M195,270 L195,415 A145,145 0 0,1 50,270 Z" fill="#E94560"/>
  <!-- Segment 4 (top-left): DEVELOP — mid navy -->
  <path d="M195,270 L50,270 A145,145 0 0,1 195,125 Z" fill="#2C4A7C"/>
  <!-- Inner white circle (redrawn on top) -->
  <circle cx="195" cy="270" r="65" fill="#FFFFFF"/>
  <text x="195" y="264" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#1A1A2E">PM</text>
  <text x="195" y="280" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#1A1A2E">CYCLE</text>

  <!-- Stage labels -->
  <!-- PLAN label -->
  <text x="282" y="188" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">PLAN</text>
  <text x="282" y="203" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#AAAAAA">Set objectives</text>
  <text x="282" y="216" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#AAAAAA">Development plan</text>

  <!-- ACT label -->
  <text x="282" y="340" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">ACT</text>
  <text x="282" y="355" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#AAAAAA">Day-to-day work</text>
  <text x="282" y="368" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#AAAAAA">Manager support</text>

  <!-- REVIEW label -->
  <text x="110" y="340" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">REVIEW</text>
  <text x="110" y="355" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#FFFFFF">Appraisal &amp; check-in</text>
  <text x="110" y="368" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#FFFFFF">Evidence gathering</text>

  <!-- DEVELOP label -->
  <text x="110" y="188" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">DEVELOP</text>
  <text x="110" y="203" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#AAAAAA">Training &amp; coaching</text>
  <text x="110" y="216" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#AAAAAA">Stretch assignments</text>

  <!-- Cycle label underneath -->
  <text x="195" y="435" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#888888">Continuous — not an annual event</text>

  <!-- Divider -->
  <line x1="395" y1="70" x2="395" y2="455" stroke="#CCCCCC" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- RIGHT: Motivation Theories comparison -->
  <text x="600" y="88" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#1A1A2E">Motivation Theories &amp; Reward Design</text>

  <!-- Maslow pyramid (simplified stacked bars) -->
  <text x="600" y="110" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#1A1A2E">Maslow's Hierarchy of Needs</text>

  <!-- Level 5 (top) -->
  <rect x="520" y="122" width="160" height="30" fill="#E94560" rx="4"/>
  <text x="600" y="142" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#FFFFFF">Self-actualisation — Meaningful work, autonomy</text>

  <!-- Level 4 -->
  <rect x="505" y="156" width="190" height="30" fill="#1A1A2E" rx="4"/>
  <text x="600" y="176" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#FFFFFF">Esteem — Recognition, promotion, bonuses</text>

  <!-- Level 3 -->
  <rect x="490" y="190" width="220" height="30" fill="#16213E" rx="4"/>
  <text x="600" y="210" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#FFFFFF">Social — Team belonging, inclusive culture</text>

  <!-- Level 2 -->
  <rect x="475" y="224" width="250" height="30" fill="#2C4A7C" rx="4"/>
  <text x="600" y="244" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#FFFFFF">Safety — Job security, safe conditions, contract certainty</text>

  <!-- Level 1 (base) -->
  <rect x="455" y="258" width="290" height="30" fill="#888888" rx="4"/>
  <text x="600" y="278" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#FFFFFF">Physiological — Basic pay (food, housing, warmth)</text>

  <text x="600" y="305" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#888888">Once lower needs are met, more pay has diminishing motivational return</text>

  <!-- Herzberg two factors -->
  <text x="600" y="330" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#1A1A2E">Herzberg's Two-Factor Theory</text>

  <!-- Hygiene factors -->
  <rect x="415" y="342" width="175" height="76" fill="#FFFFFF" rx="6" stroke="#CCCCCC" stroke-width="1.5"/>
  <rect x="415" y="342" width="175" height="24" fill="#888888" rx="6"/>
  <rect x="415" y="354" width="175" height="12" fill="#888888"/>
  <text x="502" y="358" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">Hygiene Factors</text>
  <text x="502" y="374" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#2C2C2C">Pay · Working conditions</text>
  <text x="502" y="388" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#2C2C2C">Job security · Management</text>
  <text x="502" y="404" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#888888">Absence = dissatisfaction</text>
  <text x="502" y="415" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#888888">Presence ≠ motivation</text>

  <!-- Motivators -->
  <rect x="600" y="342" width="180" height="76" fill="#FFFFFF" rx="6" stroke="#E94560" stroke-width="1.5"/>
  <rect x="600" y="342" width="180" height="24" fill="#E94560" rx="6"/>
  <rect x="600" y="354" width="180" height="12" fill="#E94560"/>
  <text x="690" y="358" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">Motivators</text>
  <text x="690" y="374" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#2C2C2C">Achievement · Recognition</text>
  <text x="690" y="388" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#2C2C2C">Responsibility · Growth</text>
  <text x="690" y="404" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#888888">Presence = active</text>
  <text x="690" y="415" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#888888">motivation &amp; satisfaction</text>

  <text x="600" y="440" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#888888">Pay alone does not sustain motivation — job design matters equally</text>

  <!-- Footer -->
  <text x="400" y="470" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#999">cipdassignmentexamples.com</text>
</svg>
